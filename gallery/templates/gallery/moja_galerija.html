<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje galerije</title>
</head>
<body>
    <h1>Dobrodošli, {{ request.user.get_full_name }}</h1>
    <ul>
        {% for galerija in galerije %}
            <li>{{ galerija.title }} - {{ galerija.event_date }}</li>
        {% endfor %}
    </ul>
    <a href="{% url "logout" %}">Odjava</a>
</body>
</html>
